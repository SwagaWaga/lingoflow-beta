<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>AXIOM Logo Concepts</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #020617;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
            gap: 80px;
        }

        .concept {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        .label {
            color: #94a3b8;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .card {
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 24px;
            padding: 48px 64px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .wordmark {
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            font-size: 22px;
            letter-spacing: 0.18em;
            color: #f1f5f9;
            text-transform: uppercase;
        }

        .sizes {
            display: flex;
            align-items: center;
            gap: 32px;
            margin-top: 16px;
        }

        .size-label {
            color: #475569;
            font-size: 11px;
            text-align: center;
            margin-top: 6px;
        }

        .size-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        hr {
            width: 100%;
            border: none;
            border-top: 1px solid #1e293b;
            margin: 20px 0;
        }
    </style>
</head>

<body>

    <!-- ─── CONCEPT 1: Apex A+X ─── -->
    <div class="concept">
        <div class="label">Concept 1 — The Apex A·X</div>
        <div class="card">
            <!-- Large version -->
            <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="g1" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#06b6d4" />
                        <stop offset="100%" stop-color="#6366f1" />
                    </linearGradient>
                </defs>
                <!-- Left diagonal of A -->
                <line x1="32" y1="6" x2="8" y2="58" stroke="url(#g1)" stroke-width="5.5" stroke-linecap="round" />
                <!-- Right diagonal of A -->
                <line x1="32" y1="6" x2="56" y2="58" stroke="url(#g1)" stroke-width="5.5" stroke-linecap="round" />
                <!-- Crossbar of A -->
                <line x1="17" y1="38" x2="47" y2="38" stroke="url(#g1)" stroke-width="5.5" stroke-linecap="round" />
                <!-- X overlay at apex — second diagonals crossing at top -->
                <line x1="24" y1="6" x2="40" y2="22" stroke="#f1f5f9" stroke-width="3" stroke-linecap="round"
                    opacity="0.6" />
                <line x1="40" y1="6" x2="24" y2="22" stroke="#f1f5f9" stroke-width="3" stroke-linecap="round"
                    opacity="0.6" />
            </svg>

            <div class="wordmark">AXIOM</div>

            <hr />
            <div class="sizes">
                <div class="size-group">
                    <svg width="32" height="32" viewBox="0 0 64 64" fill="none">
                        <defs>
                            <linearGradient id="g1b" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
                                <stop offset="0%" stop-color="#06b6d4" />
                                <stop offset="100%" stop-color="#6366f1" />
                            </linearGradient>
                        </defs>
                        <line x1="32" y1="6" x2="8" y2="58" stroke="url(#g1b)" stroke-width="5.5"
                            stroke-linecap="round" />
                        <line x1="32" y1="6" x2="56" y2="58" stroke="url(#g1b)" stroke-width="5.5"
                            stroke-linecap="round" />
                        <line x1="17" y1="38" x2="47" y2="38" stroke="url(#g1b)" stroke-width="5.5"
                            stroke-linecap="round" />
                        <line x1="24" y1="6" x2="40" y2="22" stroke="#f1f5f9" stroke-width="3" stroke-linecap="round"
                            opacity="0.6" />
                        <line x1="40" y1="6" x2="24" y2="22" stroke="#f1f5f9" stroke-width="3" stroke-linecap="round"
                            opacity="0.6" />
                    </svg>
                    <div class="size-label">32px</div>
                </div>
                <div class="size-group">
                    <svg width="20" height="20" viewBox="0 0 64 64" fill="none">
                        <defs>
                            <linearGradient id="g1c" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
                                <stop offset="0%" stop-color="#06b6d4" />
                                <stop offset="100%" stop-color="#6366f1" />
                            </linearGradient>
                        </defs>
                        <line x1="32" y1="6" x2="8" y2="58" stroke="url(#g1c)" stroke-width="5.5"
                            stroke-linecap="round" />
                        <line x1="32" y1="6" x2="56" y2="58" stroke="url(#g1c)" stroke-width="5.5"
                            stroke-linecap="round" />
                        <line x1="17" y1="38" x2="47" y2="38" stroke="url(#g1c)" stroke-width="5.5"
                            stroke-linecap="round" />
                    </svg>
                    <div class="size-label">favicon</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ─── CONCEPT 2: Quotation Anchor ─── -->
    <div class="concept">
        <div class="label">Concept 2 — The Quotation Anchor</div>
        <div class="card">
            <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="g2" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#06b6d4" />
                        <stop offset="100%" stop-color="#6366f1" />
                    </linearGradient>
                </defs>
                <!-- First quote mark: circle + descender -->
                <circle cx="20" cy="18" r="7" stroke="url(#g2)" stroke-width="5" fill="none" />
                <line x1="20" y1="25" x2="13" y2="46" stroke="url(#g2)" stroke-width="5" stroke-linecap="round" />
                <!-- Second quote mark -->
                <circle cx="42" cy="18" r="7" stroke="url(#g2)" stroke-width="5" fill="none" />
                <line x1="42" y1="25" x2="35" y2="46" stroke="url(#g2)" stroke-width="5" stroke-linecap="round" />
            </svg>

            <div class="wordmark">AXIOM</div>

            <hr />
            <div class="sizes">
                <div class="size-group">
                    <svg width="32" height="32" viewBox="0 0 64 64" fill="none">
                        <defs>
                            <linearGradient id="g2b" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
                                <stop offset="0%" stop-color="#06b6d4" />
                                <stop offset="100%" stop-color="#6366f1" />
                            </linearGradient>
                        </defs>
                        <circle cx="20" cy="18" r="7" stroke="url(#g2b)" stroke-width="5" fill="none" />
                        <line x1="20" y1="25" x2="13" y2="46" stroke="url(#g2b)" stroke-width="5"
                            stroke-linecap="round" />
                        <circle cx="42" cy="18" r="7" stroke="url(#g2b)" stroke-width="5" fill="none" />
                        <line x1="42" y1="25" x2="35" y2="46" stroke="url(#g2b)" stroke-width="5"
                            stroke-linecap="round" />
                    </svg>
                    <div class="size-label">32px</div>
                </div>
                <div class="size-group">
                    <svg width="20" height="20" viewBox="0 0 64 64" fill="none">
                        <defs>
                            <linearGradient id="g2c" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
                                <stop offset="0%" stop-color="#06b6d4" />
                                <stop offset="100%" stop-color="#6366f1" />
                            </linearGradient>
                        </defs>
                        <circle cx="20" cy="18" r="7" stroke="url(#g2c)" stroke-width="5" fill="none" />
                        <line x1="20" y1="25" x2="13" y2="46" stroke="url(#g2c)" stroke-width="5"
                            stroke-linecap="round" />
                        <circle cx="42" cy="18" r="7" stroke="url(#g2c)" stroke-width="5" fill="none" />
                        <line x1="42" y1="25" x2="35" y2="46" stroke="url(#g2c)" stroke-width="5"
                            stroke-linecap="round" />
                    </svg>
                    <div class="size-label">favicon</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ─── CONCEPT 3: Cursor + Check ─── -->
    <div class="concept">
        <div class="label">Concept 3 — Cursor · Check</div>
        <div class="card">
            <svg width="80" height="64" viewBox="0 0 80 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="g3" x1="0" y1="0" x2="80" y2="64" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#06b6d4" />
                        <stop offset="100%" stop-color="#6366f1" />
                    </linearGradient>
                </defs>
                <!-- Cursor bar | -->
                <line x1="14" y1="10" x2="14" y2="54" stroke="#f1f5f9" stroke-width="6" stroke-linecap="round" />
                <!-- Wave ~ -->
                <path d="M26 36 Q32 26 38 36 Q44 46 50 36" stroke="url(#g3)" stroke-width="5" stroke-linecap="round"
                    stroke-linejoin="round" fill="none" />
                <!-- Checkmark ✓ -->
                <path d="M56 36 L63 46 L76 22" stroke="url(#g3)" stroke-width="5" stroke-linecap="round"
                    stroke-linejoin="round" fill="none" />
            </svg>

            <div class="wordmark">AXIOM</div>

            <hr />
            <div class="sizes">
                <div class="size-group">
                    <svg width="40" height="32" viewBox="0 0 80 64" fill="none">
                        <defs>
                            <linearGradient id="g3b" x1="0" y1="0" x2="80" y2="64" gradientUnits="userSpaceOnUse">
                                <stop offset="0%" stop-color="#06b6d4" />
                                <stop offset="100%" stop-color="#6366f1" />
                            </linearGradient>
                        </defs>
                        <line x1="14" y1="10" x2="14" y2="54" stroke="#f1f5f9" stroke-width="6"
                            stroke-linecap="round" />
                        <path d="M26 36 Q32 26 38 36 Q44 46 50 36" stroke="url(#g3b)" stroke-width="5"
                            stroke-linecap="round" fill="none" />
                        <path d="M56 36 L63 46 L76 22" stroke="url(#g3b)" stroke-width="5" stroke-linecap="round"
                            fill="none" />
                    </svg>
                    <div class="size-label">32px</div>
                </div>
                <div class="size-group">
                    <svg width="24" height="20" viewBox="0 0 80 64" fill="none">
                        <defs>
                            <linearGradient id="g3c" x1="0" y1="0" x2="80" y2="64" gradientUnits="userSpaceOnUse">
                                <stop offset="0%" stop-color="#06b6d4" />
                                <stop offset="100%" stop-color="#6366f1" />
                            </linearGradient>
                        </defs>
                        <line x1="14" y1="10" x2="14" y2="54" stroke="#f1f5f9" stroke-width="6"
                            stroke-linecap="round" />
                        <path d="M26 36 Q32 26 38 36 Q44 46 50 36" stroke="url(#g3c)" stroke-width="5"
                            stroke-linecap="round" fill="none" />
                        <path d="M56 36 L63 46 L76 22" stroke="url(#g3c)" stroke-width="5" stroke-linecap="round"
                            fill="none" />
                    </svg>
                    <div class="size-label">favicon</div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
